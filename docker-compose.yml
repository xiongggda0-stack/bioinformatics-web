services:
  db:
    image: postgres:15
    container_name: bioinformatics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bioinfo
      POSTGRES_USER: bioinfo
      POSTGRES_PASSWORD: bioinfo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bioinfo -d bioinfo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bioinformatics_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://bioinfo:bioinfo_password@db:5432/bioinfo
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bioinformatics_frontend
    restart: unless-stopped
    environment:
      BACKEND_API_URL: http://backend:8000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  frontend_node_modules:
