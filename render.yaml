services:
  - type: web
    name: bioinformatics-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bioinformatics-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://bioinformatics-web.vercel.app
    plan: free

databases:
  - name: bioinformatics-db
    plan: free
